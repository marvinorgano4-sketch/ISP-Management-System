services:
  - type: web
    name: isp-management-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///isp_billing.db
      - key: MIKROTIK_HOST
        value: 192.168.10.5
      - key: MIKROTIK_USER
        value: admin
      - key: MIKROTIK_PASSWORD
        sync: false

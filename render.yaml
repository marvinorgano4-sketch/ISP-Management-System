services:
  - type: web
    name: isp-management-system
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: MIKROTIK_HOST
        value: 192.168.10.5
      - key: MIKROTIK_USER
        value: admin
      - key: MIKROTIK_PASSWORD
        sync: false
